<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Приказы МОКПТД | для противотуберкулезных кабинетов</title>
    <!-- Шрифты Inter -->
    <style>
        @font-face {
            font-family: 'Inter';
            font-style: normal;
            font-weight: 400;
            font-display: swap;
            src: url('./fonts/inter-cyrillic-400-normal.woff2') format('woff2');
        }
        @font-face {
            font-family: 'Inter';
            font-style: normal;
            font-weight: 500;
            font-display: swap;
            src: url('./fonts/inter-cyrillic-500-normal.woff2') format('woff2');
        }
        @font-face {
            font-family: 'Inter';
            font-style: normal;
            font-weight: 600;
            font-display: swap;
            src: url('./fonts/inter-cyrillic-600-normal.woff2') format('woff2');
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            background: #f4f7fc;
            color: #1e2b3a;
            line-height: 1.5;
            max-width: 1300px;
            margin: 0 auto;
            padding: 30px 25px;
            font-weight: 400;
        }
        .header {
            margin-bottom: 40px;
        }
        .header-title {
            font-size: 2.2rem;
            font-weight: 600;
            color: #003b6f;
            line-height: 1.2;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }
        .header-sub {
            font-size: 1.2rem;
            font-weight: 400;
            color: #2c5779;
            border-left: 4px solid #2c8bd4;
            padding-left: 18px;
            margin-top: 4px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 18px;
        }
        .card {
            background: #ffffff;
            border: 1px solid #cfddee;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            transition: border 0.2s, box-shadow 0.2s;
        }
        .card:hover {
            border-color: #8bb4da;
            box-shadow: 0 4px 12px rgba(0, 59, 111, 0.08);
        }
        .card-body {
            padding: 20px 20px 15px 20px;
            flex: 1;
        }
        .card-title {
            font-size: 1.0rem;
            font-weight: 500;
            color: #003b6f;
            line-height: 1.45;
            word-break: break-word;
            display: -webkit-box;
            -webkit-line-clamp: 7;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .card-footer {
            padding: 10px 20px 20px 20px;
            border-top: 1px solid #e7edf5;
            display: flex;
            justify-content: flex-end;
        }
        .btn-open {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #1a5f9e;
            color: white;
            text-decoration: none;
            padding: 8px 26px;
            border-radius: 30px;
            font-weight: 500;
            font-size: 0.95rem;
            border: none;
            transition: background 0.2s;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(26, 95, 158, 0.2);
        }
        .btn-open:hover {
            background: #2c8bd4;
        }
        .btn-open::after {
            content: " →";
            font-size: 1.2rem;
            line-height: 1;
        }
        .footer {
            margin-top: 55px;
            font-size: 0.9rem;
            color: #4f6f8f;
            text-align: center;
            border-top: 1px dashed #b8cee4;
            padding-top: 25px;
        }
        @media (max-width: 500px) {
            body { padding: 20px 15px; }
            .header-title { font-size: 1.8rem; }
            .header-sub { font-size: 1rem; }
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1 class="header-title">Приказы ГБУЗ МО МОКПТД</h1>
        <div class="header-sub">применимые к противотуберкулезным кабинетам городских больниц</div>
    </div>

    <main>
        <div class="grid" id="ordersGrid"></div>
    </main>

    <div class="footer">
        ГБУЗ Московской области «Московский областной клинический противотуберкулезный диспансер»<br>
        <span style="opacity: 0.7;">актуальные приказы для работы</span>
    </div>

    <script>
        (function() {
            // РУССКИЕ НАЗВАНИЯ ДЛЯ ОТОБРАЖЕНИЯ (то, что видят люди)
            const orders = [
                "Письмо № 04-594_25 о Порядок ведения медицинской карты пациента. Порядок оформления документации при взятии на учет Алгоритм обследования пациента ИФ.pdf",
                "Приказ № 109-25 от 14.07.2025 Об организации деятельности по мониторингу эффективности и безопасности лекарственных препаратов.pdf",
                "Приказ № 116-24 от 21.05.2024 Об обращении лекарственных средств и медицинских изделий.pdf",
                "Приказ № 15-26 от 15.01.2026 О централизованном контроле за диспансерным наблюдением, лечением больных туберкулезом и контролем за оформлением свидетельства о смерти от туберкулеза в Московской....pdf",
                "Приказ № 198-23 от 17.07.2023 О правилах пребывания пациентов в стационарных отделениях.pdf",
                "Приказ № 211-25 от 27.11.2025 Об утверждении алгоритма назначения МГМ пациентам с подозрением или выявленным диагнозом Тб.pdf",
                "Приказ № 217-22 от 28.07.2022 Об алгоритме контроля за оформлением и ведением медицинской карты пациента, получающего медицинскую помощь в ам.pdf",
                "Приказ № 220-23 от 04.09.2023 о перечне продуктов, запрещенных для передачи.pdf",
                "Приказ № 94-24 от 18.04.2024 Об утверждении порядка назначения и выдачи лекарственных препаратов.pdf",
                "Приказ № 99-22 от 01.04.2022 Порядок организации работы в очагах.pdf"
            ];

            // ЛАТИНИЦА ДЛЯ ССЫЛОК (фактические имена файлов в папке documents/)
            const fileNames = [
                "pismo_04-594_25.pdf",
                "prikaz_109-25.pdf",
                "prikaz_116-24.pdf",
                "prikaz_15-26.pdf",
                "prikaz_198-23.pdf",
                "prikaz_211-25.pdf",
                "prikaz_217-22.pdf",
                "prikaz_220-23.pdf",
                "prikaz_94-24.pdf",
                "prikaz_99-22.pdf"
            ];

            const BASE_PATH = 'documents/';
            const grid = document.getElementById('ordersGrid');
            if (!grid) return;

            grid.innerHTML = '';

            orders.forEach((displayName, index) => {
                const card = document.createElement('div');
                card.className = 'card';

                const body = document.createElement('div');
                body.className = 'card-body';
                const title = document.createElement('div');
                title.className = 'card-title';
                title.textContent = displayName;  // РУССКОЕ название в интерфейсе
                body.appendChild(title);

                const footer = document.createElement('div');
                footer.className = 'card-footer';

                const link = document.createElement('a');
                link.className = 'btn-open';
                link.href = BASE_PATH + fileNames[index];  // ЛАТИНИЦА в ссылке
                link.target = '_blank';
                link.rel = 'noopener noreferrer';
                link.textContent = 'Открыть'; 

                footer.appendChild(link);
                card.appendChild(body);
                card.appendChild(footer);
                grid.appendChild(card);
            });
        })();
    </script>
</body>
</html>
